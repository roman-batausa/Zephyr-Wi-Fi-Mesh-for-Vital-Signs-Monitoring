# ESP32 Zephyr Mesh with MAX30102 Sensor and MQTT Configuration

# Wi-Fi Configuration
CONFIG_WIFI=y

# Network Configuration
CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_IF_MAX_IPV4_COUNT=2
CONFIG_NET_IF_MAX_IPV6_COUNT=2
CONFIG_NET_IPV4=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=20
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096
CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=100
CONFIG_NET_BUF_TX_COUNT=100
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=4096
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POLL_MAX=12
CONFIG_POSIX_API=y

# Memory (increased for MQTT and sensor processing)
CONFIG_KERNEL_MEM_POOL=y
CONFIG_MAIN_STACK_SIZE=11264
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192

# DHCP
CONFIG_NET_DHCPV4=y
CONFIG_NET_DHCPV4_SERVER=y
CONFIG_NET_DHCPV4_SERVER_ADDR_LEASE_TIME=7200
CONFIG_NET_DHCPV4_SERVER_ADDR_COUNT=20

# MQTT Configuration (non-TLS for local broker)
CONFIG_MQTT_LIB=y
CONFIG_MQTT_KEEPALIVE=60

# LOG Configuration
CONFIG_LOG=y
CONFIG_NET_LOG=y

# GPIO and I2C
CONFIG_GPIO=y
CONFIG_I2C=y

# Display - SH1106 OLED
CONFIG_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_SSD1306_DEFAULT_CONTRAST=128
CONFIG_CHARACTER_FRAMEBUFFER=y
CONFIG_CHARACTER_FRAMEBUFFER_USE_DEFAULT_FONTS=y

# MAX30102 Sensor Configuration
CONFIG_SENSOR=y
CONFIG_MAX30101=y
CONFIG_MAX30101_SPO2_MODE=y
CONFIG_MAX30101_LED1_PA=0x5a
CONFIG_MAX30101_LED2_PA=0x50
CONFIG_MAX30101_SMP_AVE=0
CONFIG_MAX30101_ADC_RGE=3
CONFIG_MAX30101_SR=3
CONFIG_MAX30101_FIFO_ROLLOVER_EN=y
CONFIG_MAX30101_FIFO_A_FULL=0

# Floating point support for sensor calculations
CONFIG_FPU=y
CONFIG_NEWLIB_LIBC=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# Random number generator (for MQTT client ID)
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Disable features
CONFIG_BOOT_BANNER=n
CONFIG_BT=n